<ion-content class="ion-no-padding">
  <div class="login-container">
    <!-- Fondo animado sutil -->
    <div class="background-glow"></div>
    <div class="background-glow glow-2"></div>
    
    <div class="content-wrapper">
      <!-- Logo Container -->
      <div class="logo-container">
        <div class="logo-circle">
          <svg viewBox="0 0 24 24" fill="none" class="heart-icon" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" fill="currentColor" />
            <path d="M12 11c1-1.5 2-2 3.5-2" stroke="white" stroke-width="1.5" />
          </svg>
        </div>
        <div class="brand-text">AffiniScore</div>
        <p class="brand-subtitle">CRECIENDO JUNTOS...</p>
      </div>
      
      <!-- Titulo -->
      <div class="header-text">
        <h1 class="title">Crea tu cuenta</h1>
        <p class="subtitle">Empieza el camino hacia una relación más fuerte.</p>
      </div>

      <!-- Formulario -->
      <form (ngSubmit)="onSubmit()" class="form-container">
        <div class="input-group">
          <label class="input-label">Nombre Completo</label>
          <div class="input-wrapper">
            <input [(ngModel)]="fullName" name="fullName" type="text" placeholder="Tu nombre" required />
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">Email o Usuario</label>
          <div class="input-wrapper">
            <input [(ngModel)]="email" name="email" type="email" placeholder="usuario@amor.com" required />
          </div>
        </div>
        
        <div class="input-group">
          <label class="input-label">Contraseña</label>
          <div class="input-wrapper">
            <input [(ngModel)]="password" name="password" type="password" placeholder="••••••••" required />
          </div>
        </div>
        
        <button type="submit" class="submit-btn" [disabled]="loading()">
          <ion-spinner *ngIf="loading()" name="crescent" color="light"></ion-spinner>
          <span *ngIf="!loading()">Registrarse</span>
        </button>
      </form>

      <!-- Toggle view -->
      <div class="footer-text">
        <span>¿Ya eres usuario? <span class="highlight" (click)="goToLogin()">Inicia Sesión</span></span>
      </div>
    </div>
  </div>
</ion-content>
