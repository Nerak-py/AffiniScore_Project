<ion-content class="ion-no-padding">
  <div class="login-container">
    <!-- Fondo animado sutil -->
    <div class="background-glow"></div>
    <div class="background-glow glow-2"></div>
    
    <div class="content-wrapper">
      <!-- Logo Container -->
      <div class="logo-container">
        <div class="logo-circle">
          <svg viewBox="0 0 24 24" fill="none" class="heart-icon" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" fill="currentColor" />
            <path d="M12 11c1-1.5 2-2 3.5-2" stroke="white" stroke-width="1.5" />
          </svg>
        </div>
        <div class="brand-text">AffiniScore</div>
        <p class="brand-subtitle">CRECIENDO JUNTOS...</p>
      </div>
      
      <!-- Titulo -->
      <div class="header-text">
        <h1 class="title">Bienvenido de nuevo</h1>
        <p class="subtitle">Tu relación te ha estado extrañando.</p>
      </div>

      <!-- Formulario -->
      <form (ngSubmit)="onSubmit()" class="form-container">
        <div class="input-group">
          <label class="input-label">Email o Usuario</label>
          <div class="input-wrapper">
            <input [(ngModel)]="email" name="email" type="email" placeholder="usuario@amor.com" required />
          </div>
        </div>
        
        <div class="input-group">
          <label class="input-label">Contraseña</label>
          <div class="input-wrapper">
            <input [(ngModel)]="password" name="password" type="password" placeholder="••••••••" required />
          </div>
        </div>
        
        <div class="forgot-password">
          <span>¿Olvidaste tu contraseña?</span>
        </div>
        
        <button type="submit" class="submit-btn" [disabled]="loading()">
          <ion-spinner *ngIf="loading()" name="crescent" color="light"></ion-spinner>
          <span *ngIf="!loading()">Iniciar Sesión</span>
        </button>
      </form>

      <!-- Separador -->
      <div class="divider">
        <span>O continúa con</span>
      </div>

      <!-- Botones Sociales -->
      <div class="social-buttons">
        <button class="social-btn">
          <svg class="social-icon google" viewBox="0 0 24 24" fill="currentColor"><path d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.748L12.545,10.239z"/></svg>
          Google
        </button>
        <button class="social-btn">
          <svg class="social-icon qr" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
          QR Code
        </button>
      </div>

      <!-- Toggle view -->
      <div class="footer-text">
        <span>¿No tienes cuenta? <span class="highlight" (click)="goToRegister()">Regístrate aquí</span></span>
      </div>
    </div>
  </div>
</ion-content>
