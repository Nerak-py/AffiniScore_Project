<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar class="custom-toolbar">
    <ion-title>Afi</ion-title>
    <ion-avatar slot="end" class="header-avatar">
      <ion-icon name="heart" class="afi-icon"></ion-icon>
    </ion-avatar>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" #content class="chat-content ion-padding">

  <div class="messages-container">
    <div *ngIf="chatService.messages().length === 0" class="empty-state">
      <div class="empty-icon-wrapper">
        <ion-icon name="heart"></ion-icon>
      </div>
      <h2>Hola, soy Afi</h2>
      <p>Estoy aquí para escucharles y ayudar a que su relación florezca. ¿Qué tienen en mente hoy?</p>
    </div>

    <div *ngFor="let msg of chatService.messages()" class="message-wrapper"
      [ngClass]="{'user': msg.role === 'user', 'ai': msg.role === 'model'}">

      <div *ngIf="msg.role === 'model'" class="msg-avatar-wrapper">
        <ion-icon name="heart" class="afi-bubble-icon"></ion-icon>
      </div>

      <div class="message-bubble">
        <p>{{ msg.content }}</p>
      </div>
    </div>

    <!-- Loading state -->
    <div *ngIf="chatService.isLoading()" class="message-wrapper ai">
      <div class="msg-avatar-wrapper">
        <ion-icon name="heart" class="afi-bubble-icon"></ion-icon>
      </div>
      <div class="message-bubble typing-indicator">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

</ion-content>

<ion-footer class="ion-no-border">
  <ion-toolbar class="footer-toolbar">
    <div class="input-container">
      <ion-textarea [(ngModel)]="newMessage" placeholder="Escribe tu mensaje..." autoGrow="true" rows="1"
        (keydown.enter)="sendMessage(); $event.preventDefault()">
      </ion-textarea>
      <ion-button fill="clear" (click)="sendMessage()" [disabled]="chatService.isLoading() || !newMessage.trim()">
        <ion-icon slot="icon-only" name="send"></ion-icon>
      </ion-button>
    </div>
  </ion-toolbar>
</ion-footer>
